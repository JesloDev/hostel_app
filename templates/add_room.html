<!-- templates/add_room.html -->
{% extends "base.html" %}

{% block title %}Add Room - Hostel Allocation System{% endblock %}

{% block content %}
<h2 class="page-title">Add New Room</h2>

<div class="content-card">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Room Number</label>
                <input type="text" class="form-control" name="room_number" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Block</label>
                <select class="form-control" name="block" required>
                    <option value="">Select Block</option>
                    <option value="A">Block A</option>
                    <option value="B">Block B</option>
                    <option value="C">Block C</option>
                    <option value="D">Block D</option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label">Floor</label>
                <select class="form-control" name="floor" required>
                    <option value="">Select Floor</option>
                    <option value="1">1st Floor</option>
                    <option value="2">2nd Floor</option>
                    <option value="3">3rd Floor</option>
                    <option value="4">4th Floor</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Capacity</label>
                <select class="form-control" name="capacity" required>
                    <option value="">Select Capacity</option>
                    <option value="1">1 Person</option>
                    <option value="2">2 Persons</option>
                    <option value="3">3 Persons</option>
                    <option value="4">4 Persons</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Room Type</label>
                <select class="form-control" name="room_type" required>
                    <option value="">Select Type</option>
                    <option value="AC">AC</option>
                    <option value="Non-AC">Non-AC</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Room
            </button>
            <a href="{{ url_for('rooms') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
