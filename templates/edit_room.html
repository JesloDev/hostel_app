<!-- templates/edit_room.html -->
{% extends "base.html" %}

{% block title %}Edit Room - Hostel Allocation System{% endblock %}

{% block content %}
<h2 class="page-title">Edit Room</h2>

<div class="content-card">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Room Number</label>
                <input type="text" class="form-control" value="{{ room.room_number }}" readonly>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Block</label>
                <select class="form-control" name="block" required>
                    {% for block in ['A', 'B', 'C', 'D'] %}
                    <option value="{{ block }}" {% if room.block == block %}selected{% endif %}>Block {{ block }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label">Floor</label>
                <select class="form-control" name="floor" required>
                    {% for i in range(1, 5) %}
                    <option value="{{ i }}" {% if room.floor == i %}selected{% endif %}>{{ i }}st Floor</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Capacity</label>
                <select class="form-control" name="capacity" required>
                    {% for i in range(1, 5) %}
                    <option value="{{ i }}" {% if room.capacity == i %}selected{% endif %}>{{ i }} Person(s)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Room Type</label>
                <select class="form-control" name="room_type" required>
                    <option value="AC" {% if room.room_type == 'AC' %}selected{% endif %}>AC</option>
                    <option value="Non-AC" {% if room.room_type == 'Non-AC' %}selected{% endif %}>Non-AC</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Gender</label>
                <select class="form-control" name="gender" required>
                    <option value="Male" {% if room.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if room.gender == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Update Room
            </button>
            <a href="{{ url_for('rooms') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
